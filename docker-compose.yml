version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: zepto_postgres
    environment:
      POSTGRES_DB: zeptodev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zepto_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: zepto_api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/zeptodev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_secret_change_in_prod_min_32_chars
      JWT_ACCESS_EXPIRES: 15m
      JWT_REFRESH_EXPIRES: 7d
      PORT: 3001
      NODE_ENV: development
      CORS_ORIGINS: http://localhost:3000,exp://localhost:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    command: npm run dev

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
    container_name: zepto_admin
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001/api/v1
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
